name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # No leak-guard here, deliberately. The pattern list IS the denylist -- committing it to a
      # public repo would publish an index of exactly what we mask, and this log is public too.
      # That check runs as a local pre-push hook, which is also the right layer: CI runs AFTER the
      # push, when a leak is already public.

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
