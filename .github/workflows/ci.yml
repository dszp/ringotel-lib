name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # No leak-guard here, deliberately. The pattern list IS the denylist -- committing it to a
      # public repo would publish an index of exactly what we mask, and this log is public too.
      # That check runs as a local pre-push hook, which is also the right layer: CI runs AFTER the
      # push, when a leak is already public.

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
